version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      security-patches:
        applies-to: security-updates
        patterns: ["*"]
      minor-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
