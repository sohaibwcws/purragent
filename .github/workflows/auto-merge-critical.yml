name: Auto-merge Critical & High Vulnerabilities

on: pull_request_target

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Get Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve if Critical or High
        if: |
          steps.metadata.outputs.cvss-score >= 7.0 ||
          contains(steps.metadata.outputs.alert-state, 'critical') ||
          contains(steps.metadata.outputs.update-type, 'version-update:semver-patch')
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge if Critical or High
        if: |
          steps.metadata.outputs.cvss-score >= 7.0 ||
          contains(steps.metadata.outputs.alert-state, 'critical')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
