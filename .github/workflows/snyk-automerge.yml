name: Auto-merge Snyk PRs
on:
  pull_request:
    types: [opened, reopened, synchronize]
  check_run:
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Get PR number from either event type
            let prNumber = context.payload.pull_request?.number;

            if (!prNumber && context.payload.check_run) {
              const prs = context.payload.check_run.pull_requests;
              if (prs && prs.length > 0) {
                prNumber = prs[0].number;
              }
            }

            if (!prNumber) {
              console.log('No PR found, skipping.');
              return;
            }

            // Get full PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Check branch name
            const branch = pr.head.ref;
            if (!branch.startsWith('snyk-fix-') && !branch.startsWith('snyk-upgrade-')) {
              console.log(`Not a Snyk branch: ${branch}`);
              return;
            }

            // Wait for mergeable state to settle (retry up to 5 times)
            let mergeState = pr.mergeable_state;
            let attempts = 0;

            while (mergeState === 'unstable' || mergeState === 'unknown') {
              attempts++;
              if (attempts > 5) {
                console.log(`Gave up after 5 retries — state: ${mergeState}`);
                return;
              }
              console.log(`State is ${mergeState}, waiting 30s (attempt ${attempts}/5)...`);
              await new Promise(r => setTimeout(r, 30000));

              const { data: freshPr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              mergeState = freshPr.mergeable_state;
            }

            if (mergeState !== 'clean') {
              console.log(`Not merging — state is: ${mergeState}`);
              return;
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash',
            });

            console.log(`Merged PR #${prNumber} (${branch})`);
