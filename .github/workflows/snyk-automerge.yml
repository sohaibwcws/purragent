name: Auto-merge Snyk PRs
on:
  pull_request:
    types: [opened, reopened, synchronize]
  check_run:
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Get PR number from either event type
            let prNumber = context.payload.pull_request?.number;

            if (!prNumber && context.payload.check_run) {
              const prs = context.payload.check_run.pull_requests;
              if (prs && prs.length > 0) {
                prNumber = prs[0].number;
              }
            }

            if (!prNumber) {
              console.log('No PR found, skipping.');
              return;
            }

            // Get full PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Check branch name
            const branch = pr.head.ref;
            if (!branch.startsWith('snyk-fix-') && !branch.startsWith('snyk-upgrade-')) {
              console.log(`Not a Snyk branch: ${branch}`);
              return;
            }

            if (!pr.mergeable) {
              console.log('PR has merge conflicts, skipping.');
              return;
            }

            // Check all status checks on the PR (exclude our own workflow)
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            const otherChecks = checks.check_runs.filter(c => c.name !== 'automerge');

            const pending = otherChecks.filter(c => c.status !== 'completed');
            if (pending.length > 0) {
              console.log(`Waiting on ${pending.length} checks: ${pending.map(c => c.name).join(', ')}`);
              return;
            }

            const failed = otherChecks.filter(c => c.conclusion !== 'success' && c.conclusion !== 'neutral' && c.conclusion !== 'skipped');
            if (failed.length > 0) {
              console.log(`Failed checks: ${failed.map(c => `${c.name}=${c.conclusion}`).join(', ')}`);
              return;
            }

            // Also check commit statuses (like Snyk)
            const { data: statuses } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            if (statuses.state === 'pending') {
              console.log('Commit statuses still pending, skipping.');
              return;
            }

            if (statuses.state === 'failure') {
              console.log(`Commit status failed: ${statuses.statuses.filter(s => s.state === 'failure').map(s => s.context).join(', ')}`);
              return;
            }

            // All checks passed — merge
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash',
            });

            console.log(`Merged PR #${prNumber} (${branch})`);
