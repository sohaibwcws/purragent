name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check update type
        id: check
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          echo "Update type: $UPDATE_TYPE"
          echo "Dependency: $DEP_NAMES"
          if [ "$UPDATE_TYPE" = "version-update:semver-major" ]; then
            echo "Major update detected - will NOT auto-merge"
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo "Patch/minor update - will auto-merge after CI passes"
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for CI to pass
        if: steps.check.outputs.should_merge == 'true'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: "build"
          wait-interval: 15
          allowed-conclusions: success

      - name: Auto-merge patch/minor updates
        if: steps.check.outputs.should_merge == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Label major updates for review
        if: steps.check.outputs.should_merge == 'false'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_URL" --body "This is a **major version bump** and will NOT be auto-merged. Please review manually and test before merging."
          gh pr edit "$PR_URL" --add-label "major-update" 2>/dev/null || true
