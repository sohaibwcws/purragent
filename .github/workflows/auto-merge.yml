name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          alert-lookup: true
          compat-lookup: true

      - name: Classify update
        id: classify
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          CVSS: ${{ steps.metadata.outputs.cvss }}
          ALERT_STATE: ${{ steps.metadata.outputs.alert-state }}
          GHSA_ID: ${{ steps.metadata.outputs.ghsa-id }}
        run: |
          echo "Update type: $UPDATE_TYPE"
          echo "Dependency: $DEP_NAMES"
          echo "CVSS: $CVSS"
          echo "Alert state: $ALERT_STATE"
          echo "GHSA: $GHSA_ID"

          IS_MAJOR="false"
          IS_SECURITY="false"
          IS_HIGH_CRITICAL="false"

          if [ "$UPDATE_TYPE" = "version-update:semver-major" ]; then
            IS_MAJOR="true"
          fi

          # Security update: has a GHSA ID or alert state
          if [ -n "$GHSA_ID" ] || [ -n "$ALERT_STATE" ]; then
            IS_SECURITY="true"
          fi

          # High (CVSS >= 7.0) or Critical (CVSS >= 9.0)
          if [ -n "$CVSS" ]; then
            HIGH=$(echo "$CVSS >= 7.0" | bc -l 2>/dev/null || echo "0")
            if [ "$HIGH" = "1" ]; then
              IS_HIGH_CRITICAL="true"
            fi
          fi

          # Decision logic:
          # 1. Patch/minor (non-major) -> always auto-merge after CI
          # 2. Major + high/critical security -> auto-merge after CI
          # 3. Major + low/medium security -> manual review
          # 4. Major + no security -> manual review
          if [ "$IS_MAJOR" = "false" ]; then
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
            echo "reason=Patch/minor update - auto-merging after CI" >> "$GITHUB_OUTPUT"
          elif [ "$IS_SECURITY" = "true" ] && [ "$IS_HIGH_CRITICAL" = "true" ]; then
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
            echo "reason=Major version bump but HIGH/CRITICAL security fix (CVSS: $CVSS) - auto-merging after CI" >> "$GITHUB_OUTPUT"
          else
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            if [ "$IS_SECURITY" = "true" ]; then
              echo "reason=Major version bump with low/medium security fix (CVSS: $CVSS) - requires manual review" >> "$GITHUB_OUTPUT"
            else
              echo "reason=Major version bump (non-security) - requires manual review" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Log decision
        env:
          REASON: ${{ steps.classify.outputs.reason }}
        run: echo "$REASON"

      - name: Wait for CI build to pass
        if: steps.classify.outputs.should_merge == 'true'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: build
          wait-interval: 15
          allowed-conclusions: success

      - name: Auto-merge
        if: steps.classify.outputs.should_merge == 'true'
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash "$PR_NUM" --repo "$REPO"

      - name: Label for manual review
        if: steps.classify.outputs.should_merge == 'false'
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REASON: ${{ steps.classify.outputs.reason }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_NUM" --repo "$REPO" --body "**Manual review required:** $REASON"
          gh pr edit "$PR_NUM" --repo "$REPO" --add-label "manual-review" 2>/dev/null || true
