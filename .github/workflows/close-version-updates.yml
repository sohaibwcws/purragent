name: Close Dependabot Version Update PRs

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  close-version-updates:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Get Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Close if not a security update
        if: steps.metadata.outputs.alert-state == ''
        run: |
          gh pr close "$PR_URL" \
            --comment "Auto-closed: This is a version update, not a security fix. Security fixes are auto-merged."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
